<div style="margin-bottom: 4rem;"></div>
<grid>
  <grid-row>
    <grid-col span="8" lg="0">
    </grid-col>
    <grid-col span="8" lg="24">
      <div class="card">
        <h1>Confirm Reset Password</h1>
        <p>We've sent you a confirmation code. Enter your email address, the confirmation code, and your new password.</p>
        <fb-cva-text-input
          [label]="'Email'"
          [id]="'email-input'"
          [name]="'email-input'"
          [placeholder]="'Email'"
          [maxLength]="40"
          [required]="true"
          [autocomplete]="'off'"
          [(ngModel)]="confirmResetPasswordInput.username"
        ></fb-cva-text-input>
        <div style="margin-bottom: 1rem;"></div>
        <fb-cva-text-input
          [label]="'Reset Code'"
          [id]="'reset-code-input'"
          [name]="'reset-code-input'"
          [placeholder]="'123456'"
          [maxLength]="6"
          [required]="true"
          [autocomplete]="'off'"
          [(ngModel)]="confirmResetPasswordInput.confirmationCode"
        ></fb-cva-text-input>
        <div style="margin-bottom: 1rem;"></div>
        <fb-cva-text-input
          [label]="'New Password'"
          [id]="'new-password-input'"
          [name]="'new-password-input'"
          [placeholder]="'New Password'"
          [maxLength]="25"
          [required]="true"
          [autocomplete]="'off'"
          [(ngModel)]="confirmResetPasswordInput.newPassword"
        ></fb-cva-text-input>
        <div style="margin-bottom: 1rem;"></div>
        <button type="button" (click)="confirmNewPassword()" class="btn btn-success" [disabled]="loading || !confirmResetPasswordInput.username || !confirmResetPasswordInput.confirmationCode || !confirmResetPasswordInput.newPassword">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" *ngIf="loading"></span>
          Reset Password
        </button>
        <div style="margin-bottom: 1rem;"></div>
        <h2>Can't find the email we sent you?</h2>
        <p>
          <a [routerLink]="['/auth/request-reset-password']">Request a new one</a>
        </p>
      </div>
    </grid-col>
    <grid-col span="8" md="0">
    </grid-col>
  </grid-row>
</grid>
