<div style="margin-bottom: 4rem;"></div>
<grid>
  <grid-row>
    <grid-col span="8" lg="0">
    </grid-col>
    <grid-col span="8" lg="24">
      <div class="card">
        <h1>Confirm Sign In With Challenge</h1>
        <fb-cva-text-input
          [label]="'Challenge Response'"
          [id]="'challenge-response-input'"
          [name]="'challenge-response-input'"
          [placeholder]="'Challenge Response'"
          [maxLength]="18"
          [required]="true"
          [autocomplete]="'off'"
          [(ngModel)]="confirmSignInInput.challengeResponse"
        ></fb-cva-text-input>
        <div style="margin-bottom: 1rem;"></div>
        <div style="margin-bottom: 1rem;"></div>
        <button type="button" (click)="confirmSignIn()" class="btn btn-success" [disabled]="loading || !confirmSignInInput.challengeResponse">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" *ngIf="loading"></span>
          Confirm Sign In
        </button>
      </div>
    </grid-col>
    <grid-col span="8" md="0">
      <div *ngIf="vm$ | async as vm">
        {{ vm | json }}
      </div>
    </grid-col>
  </grid-row>
</grid>
