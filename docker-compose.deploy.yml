services:
  api:
    image: ${API_IMAGE}
    container_name: vibrant-lighthouse-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOSTNAME: ${DATABASE_HOSTNAME}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA}
      COGNITO_REGION: ${COGNITO_REGION}
      COGNITO_USERPOOL_ID: ${COGNITO_USERPOOL_ID}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID}
    networks:
      - platform
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${PLATFORM_NETWORK}
      traefik.http.routers.vibrant-lighthouse-api.rule: Host(`${API_HOST}`)
      traefik.http.routers.vibrant-lighthouse-api.entrypoints: websecure
      traefik.http.routers.vibrant-lighthouse-api.tls: "true"
      traefik.http.routers.vibrant-lighthouse-api.tls.certresolver: letsencrypt
      traefik.http.services.vibrant-lighthouse-api.loadbalancer.server.port: "8000"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: vibrant-lighthouse-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FRONTEND_API_URL: ${FRONTEND_API_URL}
      FRONTEND_COGNITO_USER_POOL_ID: ${FRONTEND_COGNITO_USER_POOL_ID}
      FRONTEND_COGNITO_APP_CLIENT_ID: ${FRONTEND_COGNITO_APP_CLIENT_ID}
    networks:
      - platform
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${PLATFORM_NETWORK}
      traefik.http.routers.vibrant-lighthouse-frontend.rule: Host(`${SPA_HOST}`)
      traefik.http.routers.vibrant-lighthouse-frontend.entrypoints: websecure
      traefik.http.routers.vibrant-lighthouse-frontend.tls: "true"
      traefik.http.routers.vibrant-lighthouse-frontend.tls.certresolver: letsencrypt
      traefik.http.services.vibrant-lighthouse-frontend.loadbalancer.server.port: "80"

networks:
  platform:
    external: true
    name: ${PLATFORM_NETWORK}
