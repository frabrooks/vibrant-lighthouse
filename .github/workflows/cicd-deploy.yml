name: Build Images And Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "database/**"
      - "ng-app/**"
      - "docker-compose.deploy.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/cicd-deploy.yml"
      - ".env.example"
      - ".dockerignore"
      - "DEPLOYMENT.md"
  workflow_dispatch:

jobs:
  deploy-api:
    name: Build images, migrate, and deploy FastAPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REMOTE_DIR: /home/${{ secrets.VM_USER }}/vibrant-lighthouse

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "API_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vibrant-lighthouse-api" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vibrant-lighthouse-frontend" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./ng-app
          file: ./ng-app/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Copy deployment compose file to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || '22' }}
          source: "docker-compose.deploy.yml"
          target: ${{ env.REMOTE_DIR }}
          overwrite: true
          strip_components: 0

      - name: Run migrations and deploy API on VM
        uses: appleboy/ssh-action@v1.2.4
        env:
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          DOCKER_IMAGE: ${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          API_HOST: ${{ secrets.API_HOST }}
          PLATFORM_NETWORK: ${{ secrets.PLATFORM_NETWORK }}
          DATABASE_HOSTNAME: ${{ secrets.DATABASE_HOSTNAME }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_SCHEMA: ${{ secrets.DATABASE_SCHEMA }}
          COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
          COGNITO_USERPOOL_ID: ${{ secrets.COGNITO_USERPOOL_ID }}
          COGNITO_APP_CLIENT_ID: ${{ secrets.COGNITO_APP_CLIENT_ID }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || '22' }}
          envs: REMOTE_DIR,DOCKER_IMAGE,API_HOST,PLATFORM_NETWORK,DATABASE_HOSTNAME,DATABASE_PORT,DATABASE_NAME,DATABASE_USERNAME,DATABASE_PASSWORD,DATABASE_SCHEMA,COGNITO_REGION,COGNITO_USERPOOL_ID,COGNITO_APP_CLIENT_ID,GHCR_USERNAME,GHCR_PAT
          script: |
            set -eu

            mkdir -p "$REMOTE_DIR"

            cat > "$REMOTE_DIR/.env" <<EOF
            API_HOST=$API_HOST
            DOCKER_IMAGE=$DOCKER_IMAGE
            PLATFORM_NETWORK=$PLATFORM_NETWORK
            DATABASE_HOSTNAME=$DATABASE_HOSTNAME
            DATABASE_PORT=$DATABASE_PORT
            DATABASE_NAME=$DATABASE_NAME
            DATABASE_USERNAME=$DATABASE_USERNAME
            DATABASE_PASSWORD=$DATABASE_PASSWORD
            DATABASE_SCHEMA=$DATABASE_SCHEMA
            COGNITO_REGION=$COGNITO_REGION
            COGNITO_USERPOOL_ID=$COGNITO_USERPOOL_ID
            COGNITO_APP_CLIENT_ID=$COGNITO_APP_CLIENT_ID
            EOF

            docker network inspect "$PLATFORM_NETWORK" >/dev/null 2>&1 || docker network create --driver bridge "$PLATFORM_NETWORK"

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            cd "$REMOTE_DIR"
            docker compose -f docker-compose.deploy.yml pull api
            docker compose -f docker-compose.deploy.yml run --rm api alembic -c database/alembic.ini upgrade head
            docker compose -f docker-compose.deploy.yml up -d api
